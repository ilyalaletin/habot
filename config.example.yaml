wirenboard:
  devices:
    - id: "wb-mr6c_1"
      name: "Relay Hall"
      room: "Hall"
      type: "switch"  # switch | dimmer | sensor
      topic: "/devices/wb-mr6c_1/controls/K1"

    - id: "wb-msw3_temp"
      name: "Temperature Server"
      room: "Server Room"
      type: "sensor"
      topic: "/devices/wb-msw-v3_1/controls/Temperature"
      unit: "C"

database:
  path: "./data/habot.db"
  history_retention_days: 30
